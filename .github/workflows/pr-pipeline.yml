name: decentralized-feeder-pull-request-pipeline

on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'tools/**'
      - '**.md'
      - '.gitignore'
      - 'config/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  GOPRIVATE: github.com/diadata-org/*

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [cmd/scrapers, cmd/simulators]
    steps:
      - uses: actions/checkout@v4

      - name: Configure git for private modules
        run: git config --global url."https://${{ secrets.LUMINA_INFRA_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ${{ matrix.module }}
          skip-cache: true
