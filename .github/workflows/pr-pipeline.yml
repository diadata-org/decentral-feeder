name: decentralized-feeder-pull-request-pipeline

on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'tools/**'
      - '**.md'
      - '.gitignore'
      - 'config/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [cmd/scrapers, cmd/simulators]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build to verify compilation
        run: |
          cd ${{ matrix.module }}
          go build ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ${{ matrix.module }}
