name: decentralized-feeder-master-pipeline

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'tools/**'
      - '**.md'
      - '.gitignore'
      - 'config/**'
  workflow_dispatch:  # This allows manual triggering

permissions:
  contents: read
  packages: write
  deployments: write  # Only if deployments are required
  id-token: none  # Disable unless specifically needed

jobs:
  push_image_and_deploy:
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository
      - uses: actions/checkout@v4

      # Get Short Commit Hash for the latest commit in master
      - name: Get Short Commit Hash
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          echo "COMMIT_HASH=$COMMIT_HASH" >> $GITHUB_ENV

      # Checkout the lumina-infra repository
      - name: Checkout lumina-infra repository
        env:
          LUMINA_INFRA_PAT: ${{ secrets.LUMINA_INFRA_PAT }}
        run: |
          git clone -q https://$LUMINA_INFRA_PAT@github.com/diadata-org/lumina-infra lumina-infra

      # Configure AWS credentials and push to ECR
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build and Tag Docker images for AWS ECR
      - name: Build and Tag Docker images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: commit-hash-${{ env.COMMIT_HASH }}
        run: |
          docker build -f build/Dockerfile-luminaScraperFeeder -t ${ECR_REGISTRY}/lumina/decentralized-feeder:${IMAGE_TAG} .
          docker build -f build/Dockerfile-luminaSimulationFeeder -t ${ECR_REGISTRY}/lumina/simulation-feeder:${IMAGE_TAG} .

      - name: Push images to AWS ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: commit-hash-${{ env.COMMIT_HASH }}
        run: |
          docker push ${ECR_REGISTRY}/lumina/decentralized-feeder:${IMAGE_TAG}
          docker push ${ECR_REGISTRY}/lumina/simulation-feeder:${IMAGE_TAG}

          echo "Pushed images to AWS ECR:"
          echo "  ${ECR_REGISTRY}/lumina/decentralized-feeder:${IMAGE_TAG}"
          echo "  ${ECR_REGISTRY}/lumina/simulation-feeder:${IMAGE_TAG}"

      # Update AWS mainnet feeder image tags in lumina-infra
      - name: Update AWS mainnet feeder values and push to lumina-infra
        env:
          LUMINA_INFRA_PAT: ${{ secrets.LUMINA_INFRA_PAT }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd lumina-infra

          # Configure git
          git config user.name "DIA Lumina Bot"
          git config user.email "infrastructure@diadata.org"

          # Update image registry and tag for mainnet scraper feeder
          VALUES_FILE="helmcharts/decentral-feeders-aws/003-scraper-mainnet-aws/values.yaml"
          if [ -f "$VALUES_FILE" ]; then
            echo "Updating mainnet scraper: $VALUES_FILE"
            sed -i "s|image: [^,]*|image: ${ECR_REGISTRY}/lumina/decentralized-feeder|" "$VALUES_FILE"
            sed -i "s|tag: [^}]*|tag: commit-hash-${{ env.COMMIT_HASH }}|" "$VALUES_FILE"
          fi

          # Show what changed
          echo "Changes to be committed:"
          git diff helmcharts/decentral-feeders-aws/003-scraper-mainnet-aws/values.yaml

          # Commit and push if there are changes
          if ! git diff --quiet; then
            git add helmcharts/decentral-feeders-aws/003-scraper-mainnet-aws/values.yaml
            git commit -m "Deploy AWS mainnet feeder: commit-hash-${{ env.COMMIT_HASH }}"
            git push https://$LUMINA_INFRA_PAT@github.com/diadata-org/lumina-infra.git HEAD:master
            echo "Pushed updates to lumina-infra. ArgoCD will sync AWS mainnet feeder automatically."
          else
            echo "No changes to commit"
          fi

          cd ..

      # Install kubectl
      - name: Install kubectl
        run: |
          curl -LO "https://storage.googleapis.com/kubernetes-release/release/$(curl -s https://storage.googleapis.com/kubernetes-release/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x ./kubectl
          sudo mv ./kubectl /usr/local/bin/kubectl

      - name: Civo Cluster kubectl config
        env:
          TOKEN: ${{ secrets.K8S_SERVICE_ACCOUNT_TOKEN_CIVO }}
          CLUSTER_NAME: ${{ secrets.K8s_CLUSTER_NAME_CIVO }}
          CONTEXT: ${{ secrets.K8s_CONTEXT_CIVO }}
          API_SERVER:  ${{ secrets.K8S_API_SERVER_CIVO }}
          KUBE_CA_CERT_BASE64: ${{ secrets.KUBE_CA_CERT_BASE64_CIVO }}
          SERVICE_ACCOUNT: ${{ secrets.K8S_SA }}
        run: |
          TOKEN=$(echo "$TOKEN" | tr -d '\n')
          echo "$KUBE_CA_CERT_BASE64" | base64 --decode > /tmp/ca.pem
          kubectl config set-cluster "$CLUSTER_NAME" \
            --server="$API_SERVER" \
            --certificate-authority=/tmp/ca.pem
          kubectl config set-credentials $SERVICE_ACCOUNT --token="$TOKEN"
          kubectl config set-context $CONTEXT --cluster="$CLUSTER_NAME" --user=$SERVICE_ACCOUNT
          kubectl config use-context $CONTEXT

      # Civo Testnet Scraper
      - name: Helm upgrade/install scraper feeders to Civo Cluster
        run: |
          echo "Deploying scraper feeder 005"
          cd lumina-infra/helmcharts/decentral-feeders/005-scraper-testnet-civo
          helm upgrade --install -n dia-lumina \
            --set repository.tag="commit-hash-${{ env.COMMIT_HASH }}" \
            005-scraper-testnet .
          cd -

          echo "Deploying scraper feeder 006"
          cd lumina-infra/helmcharts/decentral-feeders/006-scraper-testnet-civo
          helm upgrade --install -n dia-lumina \
            --set repository.tag="commit-hash-${{ env.COMMIT_HASH }}" \
            006-scraper-testnet .
          cd -

          echo "Deploying scraper mainnet node 002"
          cd lumina-infra/helmcharts/decentral-feeders/002-scraper-mainnet-civo
          helm upgrade --install -n lumina-mainnet \
            --set repository.tag="commit-hash-${{ env.COMMIT_HASH }}" \
            002-scraper-mainnet .
          cd -

          # Clean up CA certificate
          if [ -f /tmp/ca.pem ]; then shred -u /tmp/ca.pem; fi

      # Cleanup the cloned repository
      - name: Cleanup cloned repository
        run: |
          rm -rf lumina-infra
          if [ -f /tmp/ca.pem ]; then
            shred -u /tmp/ca.pem
          fi
