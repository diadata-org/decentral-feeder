name: decentralized-feeder-release-pipeline

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  deployments: write
  id-token: none

jobs:
  push_images:
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository
      - uses: actions/checkout@v4

      # Get release tag
      - name: Get Release Tag
        run: |
          RELEASE_TAG=${GITHUB_REF#refs/tags/}
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV

      # Configure AWS credentials and push to ECR
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build and Tag Docker images for AWS ECR
      - name: Build and Tag Docker images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -f build/Dockerfile-luminaScraperFeeder -t ${ECR_REGISTRY}/lumina/decentralized-feeder:${{ env.RELEASE_TAG }} .
          docker build -f build/Dockerfile-luminaSimulationFeeder -t ${ECR_REGISTRY}/lumina/simulation-feeder:${{ env.RELEASE_TAG }} .

      - name: Push images to AWS ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker push ${ECR_REGISTRY}/lumina/decentralized-feeder:${{ env.RELEASE_TAG }}
          docker push ${ECR_REGISTRY}/lumina/simulation-feeder:${{ env.RELEASE_TAG }}

          echo "Pushed images to AWS ECR:"
          echo "  ${ECR_REGISTRY}/lumina/decentralized-feeder:${{ env.RELEASE_TAG }}"
          echo "  ${ECR_REGISTRY}/lumina/simulation-feeder:${{ env.RELEASE_TAG }}"

      # Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Extract semantic version (remove 'v' prefix)
      - name: Set SemVer tag
        run: |
          SEMVER_TAG=${RELEASE_TAG#v}
          echo "SEMVER_TAG=$SEMVER_TAG" >> $GITHUB_ENV

      # Build & push multi-arch scraper to Docker Hub
      - name: Build & Push Decentralized Feeder Scraper Multi-arch to Docker Hub
        uses: docker/build-push-action@v4
        timeout-minutes: 30
        with:
          context: .
          file: build/Dockerfile-luminaScraperFeeder
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            diadata/decentralized-feeder:${{ env.SEMVER_TAG }}
            diadata/decentralized-feeder:scraper-${{ env.SEMVER_TAG }}
            ${{ !contains(env.SEMVER_TAG, '-') && 'diadata/decentralized-feeder:latest' || '' }}
            ${{ !contains(env.SEMVER_TAG, '-') && 'diadata/decentralized-feeder:scraper-latest' || '' }}
          cache-from: type=registry,ref=diadata/decentralized-feeder:buildcache
          cache-to: type=registry,ref=diadata/decentralized-feeder:buildcache,mode=max

      # Logout and cleanup
      - name: Logout and cleanup
        run: |
          docker logout
