[profile.default]
src = "contracts"
out = "out"
libs = [ "lib"]
solc_version = "0.8.34"
test = "test-foundry"
gas_price = 10
gas_reports = ["*"]
via_ir = true
optimizer = true
optimizer_runs = 200
ffi = true
ast = true
build_info = true
extra_output = ["storageLayout"]
skip = [
    "contracts/DIAOracleV2.sol",
    "contracts/DIAOracleV2Meta.sol",
    "contracts/IDIAOracleV2.sol"
]

remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/"
]

# Network profiles for deployment
[profile.mainnet]
chain_id = 1

[profile.testnet]
chain_id = 11155111  # Sepolia

[profile.local]
chain_id = 31337